<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <title>火种课程定位</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #171514;
      --muted: #6f6a66;
      --paper: #f6f5f2;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-solid: #fffefd;
      --line: #dfdad4;
      --accent: #b9162a;
      --accent-ink: #8f0f1f;
      --accent-soft: #fbebee;
      --warning: #80613b;
      --shadow: 0 18px 42px rgba(42, 30, 29, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(180deg, #fbfaf8 0%, #f2f0ec 100%),
        var(--paper);
      color: var(--ink);
      font-family: "Microsoft YaHei", "Source Han Sans SC", "Noto Sans CJK SC", Arial, sans-serif;
      letter-spacing: 0;
    }
    .brand-watermark {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: var(--watermark-image);
      background-repeat: no-repeat;
      background-position: center 110px;
      background-size: min(56vw, 460px);
      opacity: 0.026;
      mix-blend-mode: multiply;
    }
    .app {
      position: relative;
      z-index: 1;
      width: min(860px, 100%);
      margin: 0 auto;
      padding: 20px 16px 40px;
    }
    header {
      padding: 12px 2px 20px;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
    }
    .kicker {
      display: flex;
      align-items: center;
      color: var(--accent);
      font: 900 13px/1.15 "Microsoft YaHei", sans-serif;
      text-transform: uppercase;
    }
    .brand-logo {
      width: 46px;
      height: 46px;
      object-fit: cover;
      object-position: center 18%;
      background: #fff;
      border: 1px solid #e7d8dc;
      border-radius: 14px;
      padding: 0;
      box-shadow: 0 8px 18px rgba(90, 40, 48, 0.08);
      flex: 0 0 auto;
    }
    .brand-mark {
      width: 46px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #fff;
      border: 1px solid rgba(143, 15, 31, 0.2);
      border-radius: 14px;
      font: 900 22px/1 "Microsoft YaHei", sans-serif;
      box-shadow: 0 8px 18px rgba(90, 40, 48, 0.08);
      flex: 0 0 auto;
    }
    .brand-subline {
      margin-top: 4px;
      color: var(--muted);
      font: 700 13px/1.2 "Microsoft YaHei", sans-serif;
    }
    h1 {
      margin: 18px 0 10px;
      font-size: clamp(34px, 7vw, 48px);
      line-height: 1.06;
      font-weight: 900;
    }
    .subtitle {
      margin: 0;
      max-width: 620px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }
    .search-panel {
      position: sticky;
      top: 0;
      z-index: 5;
      margin: 6px 0 14px;
      padding: 14px;
      border: 1px solid rgba(223, 218, 212, 0.92);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .search-panel::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: var(--accent);
    }
    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid #d6d0ca;
      background: #fff;
      color: var(--ink);
      padding: 0 13px;
      font-size: 16px;
      outline: none;
      border-radius: 14px;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200,16,46,0.14);
    }
    button, .open-link {
      min-height: 48px;
      border: 0;
      border-radius: 14px;
      background: var(--ink);
      color: #fff;
      padding: 0 14px;
      font: 700 14px/1 "Microsoft YaHei", sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: transform 120ms ease, background 120ms ease, border-color 120ms ease;
    }
    button:active, .open-link:active {
      transform: translateY(1px);
    }
    #searchButton {
      background: var(--accent);
      min-width: 96px;
    }
    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }
    .tag {
      border: 1px solid rgba(185, 22, 42, 0.22);
      background: var(--accent-soft);
      color: var(--accent-ink);
      padding: 8px 11px;
      border-radius: 999px;
      font: 700 13px/1 "Microsoft YaHei", sans-serif;
      cursor: pointer;
    }
    .meta {
      margin: 12px 2px;
      color: var(--muted);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .results {
      display: grid;
      gap: 12px;
    }
    .result {
      position: relative;
      overflow: hidden;
      background: var(--panel);
      border: 1px solid rgba(223, 218, 212, 0.95);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 14px 32px rgba(42, 30, 29, 0.06);
    }
    .result::before {
      content: "";
      position: absolute;
      inset: 0 auto 0 0;
      width: 4px;
      background: var(--accent);
    }
    .result-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .episode {
      font: 900 18px/1.15 "Microsoft YaHei", sans-serif;
    }
    .time {
      color: var(--accent);
      background: var(--accent-soft);
      border: 1px solid rgba(185, 22, 42, 0.14);
      border-radius: 12px;
      padding: 7px 9px;
      font: 900 17px/1 "Microsoft YaHei", sans-serif;
      white-space: nowrap;
    }
    .lesson {
      margin-top: 6px;
      color: var(--muted);
      font-size: 13px;
    }
    .level {
      display: inline-block;
      margin-top: 6px;
      color: var(--accent);
      font: 700 12px/1.2 "Microsoft YaHei", sans-serif;
    }
    .summary {
      margin: 12px 0 8px;
      font-size: 15px;
      line-height: 1.72;
    }
    .evidence {
      border-left: 3px solid var(--accent);
      padding-left: 10px;
      color: #4a423d;
      font-size: 13px;
      line-height: 1.65;
      background: rgba(251, 235, 238, 0.72);
      border-radius: 0 10px 10px 0;
    }
    .concepts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 12px 0;
    }
    .concept {
      background: rgba(251, 235, 238, 0.72);
      color: var(--accent-ink);
      border: 1px solid rgba(200,16,46,0.18);
      padding: 5px 8px;
      border-radius: 999px;
      font: 700 12px/1 "Microsoft YaHei", sans-serif;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .copy {
      background: #fff;
      color: var(--ink);
      border: 1px solid #cfc8c1;
    }
    .disabled {
      background: #eee9e3;
      color: var(--warning);
      cursor: default;
    }
    .empty {
      border: 1px dashed var(--line);
      color: var(--muted);
      padding: 24px 16px;
      text-align: center;
      background: rgba(255,255,255,0.62);
      border-radius: 18px;
    }
    @media (max-width: 560px) {
      .app { padding: 14px 12px 28px; }
      .brand-watermark {
        background-position: center 82px;
        background-size: min(72vw, 330px);
        opacity: 0.022;
      }
      .brand-logo {
        width: 42px;
        height: 42px;
      }
      .search-panel {
        position: relative;
        margin-bottom: 10px;
      }
      .search-row { grid-template-columns: minmax(0, 1fr) 86px; }
      .actions button,
      .actions .open-link { width: 100%; }
      .quick-tags {
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 6px;
        padding-bottom: 2px;
        scrollbar-width: none;
      }
      .quick-tags::-webkit-scrollbar { display: none; }
      .tag {
        width: auto;
        min-height: 34px;
        flex: 0 0 auto;
        padding: 0 12px;
      }
      .result-head { display: grid; }
      .time { font-size: 16px; }
      .actions { grid-template-columns: 1fr; }
    }
    @media (max-width: 340px) {
      .search-row { grid-template-columns: 1fr; }
      .search-row > button { width: 100%; }
    }
  </style>
</head>

      const cutoff = strongRelevanceCutoff(maxScore);
      const ranked = scored
        .filter(([score]) => score >= cutoff)
        .sort((a, b) => b[0] - a[0] || a[1].episode_number.localeCompare(b[1].episode_number))
        .slice(0, MAX_RESULTS)
        .sort((a, b) => sortByEpisodeThenTime(a[1], b[1]) || b[0] - a[0])
        .map(([score, item]) => ({ ...item, _score: score }));

      renderResults(ranked, ranked.length ? `找到 ${ranked.length} 条最相关定位` : "没有找到匹配结果，换一个说法试试。");
    }

    function scoreItem(item, query, expandedQuery, tokens) {
      const text = normalize(item.search_text);
      let score = 0;
      if (text.includes(normalize(query))) score += 12;
      if (text.includes(normalize(expandedQuery))) score += 4;
      for (const token of tokens) {
        if (text.includes(normalize(token))) score += token.length >= 4 ? 4 : token.length >= 2 ? 1.4 : 0.1;
      }
      if (item.concepts.some(concept => normalize(query).includes(normalize(concept)) || normalize(concept).includes(normalize(query)))) score += 6;
      return score;
    }

    function strongRelevanceCutoff(maxScore) {
      if (maxScore <= 0) return Infinity;
      return Math.max(3, maxScore * 0.5);
    }

    function sortByEpisodeThenTime(a, b) {
      const courseDiff = courseOrder(a) - courseOrder(b);
      if (courseDiff !== 0) return courseDiff;
      const episodeDiff = episodeNumber(a.episode_number) - episodeNumber(b.episode_number);
      if (episodeDiff !== 0) return episodeDiff;
      return startSeconds(a.time_range) - startSeconds(b.time_range);
    }

    function courseOrder(item) {
      const level = String(item.course_level || "");
      const parsedLevel = Number.parseInt(level.replace(/\D+/g, ""), 10);
      if (!Number.isNaN(parsedLevel)) return parsedLevel;
      const name = String(item.course_name || "");
      if (name.includes("泰德调情术")) return 1;
      if (name.includes("情感原始人")) return 2;
      if (name.includes("调情大师之路")) return 3;
      return 999;
    }

    function episodeNumber(value) {
      const parsed = Number.parseInt(String(value || "").replace(/\D+/g, ""), 10);
      return Number.isNaN(parsed) ? 9999 : parsed;
    }

    function startSeconds(timeRange) {
      const start = String(timeRange || "").split("-")[0] || "00:00";
      const parts = start.split(":").map(part => Number.parseInt(part, 10) || 0);
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
      return parts[0] * 60 + (parts[1] || 0);
    }

    function expandQuery(query) {
      const additions = [];
      for (const [key, values] of Object.entries(QUERY_SYNONYMS)) {
        if (normalize(query).includes(normalize(key)) || normalize(key).includes(normalize(query))) {
          additions.push(...values);
        }
      }
      return [query, ...additions].join(" ");
    }

    function tokenize(text) {
      const cjkPhrases = text.match(/[\u4e00-\u9fff]{2,}/g) || [];
      const chars = Array.from(text.match(/[\u4e00-\u9fff]/g) || []);
      const bigrams = [];
      for (let index = 0; index < chars.length - 1; index += 1) bigrams.push(chars[index] + chars[index + 1]);
      const latin = text.toLowerCase().match(/[a-z0-9]+/g) || [];
      return Array.from(new Set([...latin, ...cjkPhrases, ...bigrams])).filter(Boolean);
    }

    function renderResults(items, label) {
      countLabel.textContent = label;
      if (!items.length) {
        results.innerHTML = `<div class="empty">没有找到结果。可以试试同义词，例如“抽离”“行为抽离”“框架”。</div>`;
        return;
      }
      results.innerHTML = items.map(renderCard).join("");
      results.querySelectorAll("[data-copy]").forEach(button => {
        button.addEventListener("click", () => copyText(button.dataset.copy));
      });
    }

    function renderCard(item) {
      const copy = buildCopyText(item);
      const conceptHtml = [...item.concepts, ...item.aliases].slice(0, 8).map(concept => `<span class="concept">${escapeHtml(concept)}</span>`).join("");
      const linkHtml = item.xiaoe_url
        ? `<a class="open-link" href="${escapeAttr(item.xiaoe_url)}" target="_blank" rel="noopener">打开小鹅通</a>`
        : `<button class="disabled" type="button">待补小鹅通链接</button>`;
      return `<article class="result">
        <div class="result-head">
          <div>
            <div class="episode">${escapeHtml(item.course_name)} · 第${escapeHtml(item.episode_number)}集</div>
            <div class="lesson">${escapeHtml(item.lesson_title)} / ${escapeHtml(item.segment_id)}</div>
            <div class="level">${escapeHtml(item.course_level)}</div>
          </div>
          <div class="time">${escapeHtml(item.time_range)}</div>
        </div>
        <p class="summary">${escapeHtml(item.summary)}</p>
        <div class="evidence">${escapeHtml(item.evidence_excerpt || "暂无证据摘录")}</div>
        <div class="concepts">${conceptHtml}</div>
        <div class="actions">
          ${linkHtml}
          <button class="copy" type="button" data-copy="${escapeAttr(copy)}">复制定位</button>
        </div>
      </article>`;
    }

    function buildCopyText(item) {
      const copyParts = [
        `${item.course_name} 第${item.episode_number}集 ${item.lesson_title} ${item.time_range}：${item.summary}`
      ];
      if (item.xiaoe_url) copyParts.push(`小鹅通链接：${item.xiaoe_url}`);
      return copyParts.join("\n");
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
    }

    function normalize(text) {
      return String(text || "").toLowerCase().replace(/\s+/g, "");
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;").replace(/\r?\n/g, "&#10;");
    }

    function debounce(fn, wait) {
      let timer = 0;
      return (...args) => {
        window.clearTimeout(timer);
        timer = window.setTimeout(() => fn(...args), wait);
      };
    }
  </script>
</body>
</html>
