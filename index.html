<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="format-detection" content="telephone=no">
  <link rel="icon" href="data:,">
  <title>火种课程定位</title>
  <style>
    :root {
      color-scheme: light dark;
      --canvas: #f6f5f2;
      --surface: rgba(255, 254, 253, 0.9);
      --surface-solid: #fffefd;
      --surface-subtle: #f1eeea;
      --text: #171514;
      --secondary: #6f6a66;
      --tertiary: #928b85;
      --separator: #dfdad4;
      --accent: #c31026;
      --accent-text: #c31026;
      --time-red: #c31026;
      --action-red: #8f0f1f;
      --action-red-pressed: #760a18;
      --accent-soft: rgba(195, 16, 38, 0.08);
      --focus-ring: rgba(195, 16, 38, 0.18);
      --warning: #80613b;
      --shadow: 0 12px 32px rgba(42, 30, 29, 0.08);
      --press-ease: cubic-bezier(0.2, 0.8, 0.2, 1);
    }
    * { box-sizing: border-box; }
    html {
      min-width: 280px;
      background: var(--canvas);
      scroll-behavior: smooth;
    }
    body {
      min-height: 100vh;
      margin: 0;
      background: var(--canvas);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 16px;
      line-height: 1.5;
      letter-spacing: 0;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    .brand-watermark {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image: var(--watermark-image);
      background-repeat: no-repeat;
      background-position: center 120px;
      background-size: min(52vw, 430px);
      opacity: 0.018;
      mix-blend-mode: multiply;
    }
    .app {
      position: relative;
      z-index: 1;
      width: min(960px, 100%);
      margin: 0 auto;
      padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(48px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
    }
    header {
      padding: 12px 2px 22px;
    }
    .brand-lockup {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }
    .kicker {
      display: flex;
      align-items: center;
      color: var(--accent-text);
      font: 700 12px/1.2 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      text-transform: uppercase;
    }
    .brand-logo {
      width: 42px;
      height: 42px;
      object-fit: cover;
      object-position: center 18%;
      background: #fff;
      border: 1px solid var(--separator);
      border-radius: 8px;
      padding: 0;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      flex: 0 0 auto;
    }
    .brand-mark {
      width: 42px;
      height: 42px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--accent);
      color: #fff;
      border: 1px solid rgba(120, 8, 30, 0.24);
      border-radius: 8px;
      font: 700 20px/1 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      flex: 0 0 auto;
    }
    .brand-subline {
      margin-top: 3px;
      color: var(--secondary);
      font: 600 12px/1.3 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    }
    h1 {
      margin: 20px 0 8px;
      font-size: 38px;
      line-height: 1.12;
      font-weight: 750;
      letter-spacing: 0;
    }
    .subtitle {
      margin: 0;
      max-width: 700px;
      color: var(--secondary);
      font-size: 14px;
      line-height: 1.65;
    }
    .search-panel {
      position: sticky;
      top: max(10px, env(safe-area-inset-top));
      z-index: 10;
      margin: 4px 0 14px;
      padding: 12px;
      border: 1px solid var(--separator);
      border-radius: 8px;
      background: var(--surface);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      backdrop-filter: blur(24px) saturate(180%);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    .search-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }
    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--separator);
      background: var(--surface-solid);
      color: var(--text);
      padding: 0 14px;
      font-size: 16px;
      outline: none;
      border-radius: 6px;
      appearance: none;
      transition: border-color 140ms var(--press-ease), box-shadow 140ms var(--press-ease);
    }
    input::placeholder { color: var(--tertiary); opacity: 1; }
    input:focus-visible {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px var(--focus-ring);
    }
    button, .open-link {
      min-height: 44px;
      border: 1px solid transparent;
      border-radius: 6px;
      background: var(--text);
      color: #fff;
      padding: 0 14px;
      font: 650 14px/1 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 100ms var(--press-ease), background-color 140ms var(--press-ease), border-color 140ms var(--press-ease), color 140ms var(--press-ease);
    }
    button:active, .open-link:active {
      transform: scale(0.98);
    }
    button:focus-visible, .open-link:focus-visible {
      outline: 3px solid var(--focus-ring);
      outline-offset: 2px;
    }
    #searchButton {
      background: var(--action-red);
      min-width: 96px;
    }
    #searchButton:hover { background: var(--action-red-pressed); }
    .quick-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .tag {
      min-height: 32px;
      border: 1px solid var(--separator);
      background: var(--surface-solid);
      color: var(--secondary);
      padding: 0 10px;
      border-radius: 6px;
      font: 600 13px/1 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
      cursor: pointer;
    }
    .tag:hover {
      border-color: rgba(195, 16, 38, 0.34);
      background: var(--accent-soft);
      color: var(--time-red);
    }
    .meta {
      margin: 14px 2px 10px;
      color: var(--secondary);
      font-size: 13px;
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .results {
      display: grid;
      gap: 10px;
    }
    .result {
      position: relative;
      overflow: hidden;
      background: var(--surface-solid);
      border: 1px solid var(--separator);
      border-radius: 8px;
      padding: 18px;
      box-shadow: 0 1px 2px rgba(0, 0, 0, 0.03);
      transition: transform 180ms var(--press-ease), border-color 180ms var(--press-ease), box-shadow 180ms var(--press-ease);
    }
    .result:hover {
      transform: translateY(-1px);
      border-color: rgba(60, 60, 67, 0.26);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }
    .result-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    .episode {
      font: 700 18px/1.3 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    }
    .time {
      display: grid;
      gap: 3px;
      justify-items: end;
      min-width: 120px;
      text-align: right;
      white-space: nowrap;
    }
    .time-label {
      color: var(--secondary);
      font-size: 11px;
      line-height: 1;
    }
    .time-value {
      color: var(--time-red);
      font: 700 17px/1.15 ui-monospace, "SFMono-Regular", Consolas, monospace;
    }
    .lesson {
      margin-top: 5px;
      color: var(--secondary);
      font-size: 13px;
      overflow-wrap: anywhere;
    }
    .level {
      display: inline-block;
      margin-top: 7px;
      color: var(--accent-text);
      font: 650 12px/1.2 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    }
    .summary {
      margin: 14px 0 9px;
      font-size: 15px;
      line-height: 1.7;
    }
    .evidence {
      border-left: 2px solid var(--accent);
      padding-left: 11px;
      color: var(--secondary);
      font-size: 13px;
      line-height: 1.7;
    }
    .concepts {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin: 12px 0;
    }
    .concept {
      background: var(--surface-subtle);
      color: var(--secondary);
      border: 1px solid var(--separator);
      padding: 5px 7px;
      border-radius: 5px;
      font: 600 12px/1 -apple-system, BlinkMacSystemFont, "PingFang SC", sans-serif;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }
    .copy {
      background: var(--surface-solid);
      color: var(--text);
      border-color: var(--separator);
    }
    .copy:hover { background: var(--surface-subtle); }
    .copy.is-success {
      background: #e8f7ed;
      border-color: #b9dfc5;
      color: #176c35;
    }
    .open-link { background: var(--action-red); }
    .open-link:hover { background: var(--action-red-pressed); }
    .disabled {
      background: var(--surface-subtle);
      color: var(--warning);
      border-color: var(--separator);
      cursor: default;
      opacity: 0.86;
    }
    .empty {
      border: 1px dashed var(--separator);
      color: var(--secondary);
      padding: 28px 16px;
      text-align: center;
      background: var(--surface-solid);
      border-radius: 8px;
    }
    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      z-index: 30;
      max-width: calc(100vw - 32px);
      padding: 10px 14px;
      border-radius: 8px;
      background: rgba(29, 29, 31, 0.9);
      color: #fff;
      font-size: 13px;
      font-weight: 650;
      box-shadow: 0 10px 28px rgba(0, 0, 0, 0.2);
      -webkit-backdrop-filter: blur(18px) saturate(160%);
      backdrop-filter: blur(18px) saturate(160%);
      pointer-events: none;
      opacity: 0;
      transform: translate(-50%, 12px) scale(0.98);
      transition: opacity 180ms var(--press-ease), transform 260ms var(--press-ease);
    }
    .toast.visible {
      opacity: 1;
      transform: translate(-50%, 0) scale(1);
    }
    @media (max-width: 560px) {
      .app {
        padding: max(12px, env(safe-area-inset-top)) max(12px, env(safe-area-inset-right)) max(28px, env(safe-area-inset-bottom)) max(12px, env(safe-area-inset-left));
      }
      header { padding: 8px 2px 16px; }
      h1 {
        margin-top: 17px;
        font-size: 30px;
        line-height: 1.16;
      }
      .subtitle { font-size: 13px; line-height: 1.6; }
      .brand-watermark {
        background-position: center 82px;
        background-size: min(68vw, 300px);
        opacity: 0.016;
      }
      .brand-logo {
        width: 38px;
        height: 38px;
      }
      .search-panel {
        position: relative;
        top: auto;
        margin: 0 0 10px;
        padding: 10px;
      }
      .search-row { grid-template-columns: minmax(0, 1fr) 86px; }
      .actions button,
      .actions .open-link { width: 100%; }
      .quick-tags {
        flex-wrap: nowrap;
        overflow-x: auto;
        gap: 6px;
        padding-bottom: 2px;
        scrollbar-width: none;
      }
      .quick-tags::-webkit-scrollbar { display: none; }
      .tag {
        width: auto;
        min-height: 32px;
        flex: 0 0 auto;
        padding: 0 10px;
      }
      .meta { margin-top: 12px; }
      .result { padding: 14px; }
      .result-head { display: grid; }
      .time {
        display: flex;
        align-items: baseline;
        justify-content: flex-start;
        gap: 7px;
        min-width: 0;
        text-align: left;
      }
      .time-value { font-size: 16px; }
      .actions { grid-template-columns: 1fr; }
    }
    @media (max-width: 340px) {
      .search-row { grid-template-columns: 1fr; }
      .search-row > button { width: 100%; }
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --canvas: #171514;
        --surface: rgba(42, 38, 36, 0.88);
        --surface-solid: #252220;
        --surface-subtle: #302c29;
        --text: #f7f4f1;
        --secondary: #bdb6b0;
        --tertiary: #958e88;
        --separator: rgba(223, 218, 212, 0.18);
        --accent: #c31026;
        --accent-text: #ff7182;
        --time-red: #ff7182;
        --action-red: #8f0f1f;
        --action-red-pressed: #760a18;
        --accent-soft: rgba(195, 16, 38, 0.2);
        --focus-ring: rgba(195, 16, 38, 0.34);
        --warning: #e0b779;
        --shadow: 0 14px 34px rgba(0, 0, 0, 0.32);
      }
      .brand-watermark { mix-blend-mode: screen; opacity: 0.024; }
      .copy.is-success {
        background: #173c24;
        border-color: #2f6d42;
        color: #9ee6b5;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      html { scroll-behavior: auto; }
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
      .result:hover { transform: none; }
    }
    @media (prefers-reduced-transparency: reduce) {
      .search-panel, .toast {
        -webkit-backdrop-filter: none;
        backdrop-filter: none;
        background: var(--surface-solid);
      }
    }
    @media (prefers-contrast: more) {
      :root { --separator: currentColor; }
      .search-panel, .result, input, button, .open-link { border-width: 2px; }
    }
  </style>
</head>

      const conceptHtml = [...item.concepts, ...item.aliases].slice(0, 8).map(concept => `<span class="concept">${escapeHtml(concept)}</span>`).join("");
      const linkHtml = item.xiaoe_url
        ? `<a class="open-link" href="${escapeAttr(item.xiaoe_url)}" target="_blank" rel="noopener">打开小鹅通</a>`
        : `<button class="disabled" type="button" disabled>待补小鹅通链接</button>`;
      return `<article class="result">
        <div class="result-head">
          <div>
            <div class="episode">${escapeHtml(item.course_name)} · 第${escapeHtml(item.episode_number)}集</div>
            <div class="lesson">${escapeHtml(item.lesson_title)} / ${escapeHtml(item.segment_id)}</div>
            <div class="level">${escapeHtml(item.course_level)}</div>
          </div>
          <div class="time"><span class="time-label">定位时间</span><span class="time-value">${escapeHtml(item.time_range)}</span></div>
        </div>
        <p class="summary">${escapeHtml(item.summary)}</p>
        <div class="evidence">${escapeHtml(item.evidence_excerpt || "暂无证据摘录")}</div>
        <div class="concepts">${conceptHtml}</div>
        <div class="actions">
          ${linkHtml}
          <button class="copy" type="button" data-copy="${escapeAttr(copy)}">复制定位</button>
        </div>
      </article>`;
    }

    function buildCopyText(item) {
      const copyParts = [
        `${item.course_name} 第${item.episode_number}集 ${item.lesson_title} ${item.time_range}：${item.summary}`
      ];
      if (item.xiaoe_url) copyParts.push(`小鹅通链接：${item.xiaoe_url}`);
      return copyParts.join("\n");
    }

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch (error) {
        const area = document.createElement("textarea");
        area.value = text;
        document.body.appendChild(area);
        area.select();
        document.execCommand("copy");
        area.remove();
      }
    }

    function showCopyFeedback(button) {
      const originalLabel = button.textContent;
      button.textContent = "已复制";
      button.classList.add("is-success");
      toast.textContent = "课程定位和小鹅通链接已复制";
      toast.classList.add("visible");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => {
        button.textContent = originalLabel;
        button.classList.remove("is-success");
        toast.classList.remove("visible");
      }, 1500);
    }

    function normalize(text) {
      return String(text || "").toLowerCase().replace(/\s+/g, "");
    }

    function escapeHtml(value) {
      return String(value || "").replace(/[&<>"']/g, char => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;").replace(/\r?\n/g, "&#10;");
    }

  </script>
</body>
</html>
